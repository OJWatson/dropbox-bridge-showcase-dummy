name: Refresh Dropbox snapshot

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/dropbox-refresh.yml"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out bridge
        uses: actions/checkout@v4
        with:
          repository: OJWatson/github-dropbox-refresh-lite
          path: bridge

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bridge dependencies
        run: python -m pip install -r bridge/requirements.txt

      - name: Refresh Dropbox and send notification
        working-directory: bridge
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_MODE: github_archive
          DROPBOX_BACKEND: token
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_TARGET_PATH: /dropbox-bridge-showcase-dummy
          DROPBOX_PERMANENT_DELETE: "false"
          DROPBOX_FORCE_NEW_SHARE_LINK: "true"
          GMAIL_BACKEND: maton
          GMAIL_ACTION: send
          GMAIL_TO: oj.watson92@gmail.com
          GMAIL_SUBJECT_PREFIX: "[Dropbox Refresh]"
          MATON_API_KEY: ${{ secrets.MATON_API_KEY }}
        run: >
          python bridge.py --force
          --github-owner "${GITHUB_REPOSITORY_OWNER}"
          --github-repo "${GITHUB_REPOSITORY#*/}"
          --github-ref "${GITHUB_SHA}"
